name: dump978
description: >-
  Containerized dump978 for decoding 978 MHz UAT ADS-B with RTL-SDR or
  SoapySDR on Linux.

post-provisioning: >-
  ## Usage instructions

  Include this snippet in your docker-compose.yml file under 'services':

    ```
    dump978:
      image: blackoutsecure/dump978:latest
      restart: unless-stopped
      environment:
        - TZ=Etc/UTC
        - DUMP978_SDR=driver=rtlsdr
      ports:
        - '8978:8978'
        - '30978:30978'
        - '30979:30979'
      volumes:
        - '/path/to/dump978/config:/config'
        - '/run/dump978-fa:/run/dump978-fa'
      devices:
        - '/dev/bus/usb:/dev/bus/usb'
    ```

  Repository: https://github.com/blackoutsecure/docker-dump978
  Upstream application: https://github.com/flightaware/dump978

version: 10.2.0
type: sw.block
assets:
  repository:
    type: blob.asset
    data:
