worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

include /etc/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Tag log lines by HTTP status severity so 4xx/5xx are easy to spot
    map $status $log_severity {
        ~^[23]  "";
        ~^4     " WARNING:";
        ~^5     " ERROR:";
        default "";
    }

    log_format prefixed '[nginx]$log_severity $remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';

    # Suppress logging for high-frequency noise:
    # - Localhost requests (HEALTHCHECK Wget probes every 30s)
    # - /data/ polling (history JSON fetched ~120x per page load)
    # access_log off in location blocks is unreliable with alias+try_files;
    # conditional logging at the http level works regardless.
    map "$remote_addr:$uri" $loggable {
        "~^127\.0\.0\.1:"  0;
        "~:/data/"         0;
        default            1;
    }
    access_log /dev/stdout prefixed if=$loggable;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy-temp;
    fastcgi_temp_path /tmp/nginx-fastcgi-temp;
    uwsgi_temp_path /tmp/nginx-uwsgi-temp;
    scgi_temp_path /tmp/nginx-scgi-temp;

    include /run/nginx/http.d/*.conf;
}
