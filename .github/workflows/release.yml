name: Release

on:
  release:
    types:
      - published
      - released
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (optional, defaults to upstream version)'
        required: false
        type: string

permissions:
  contents: write
  packages: read

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
  IMAGE_NAME: dump978
  DUMP978_REPO_URL: https://github.com/flightaware/dump978
  DUMP978_REPO_BRANCH: master

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.detect.outputs.release_tag }}
      release_name: ${{ steps.detect.outputs.release_name }}
    steps:
      - name: Detect release source
        id: detect
        env:
          EVENT_ACTION: ${{ github.event_name }}
          DISPATCH_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          DUMP978_REPO_BRANCH: ${{ env.DUMP978_REPO_BRANCH }}
        run: |
          set -euo pipefail

          echo "Event: ${EVENT_ACTION}"

          if [ "${EVENT_ACTION}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: fetching metadata from upstream flightaware/dump978 (${DUMP978_REPO_BRANCH})"

            UPSTREAM_VERSION=$(curl -fsSL \
              "https://raw.githubusercontent.com/flightaware/dump978/${DUMP978_REPO_BRANCH}/debian/changelog" \
              2>/dev/null | head -1 | awk '{print $2}' | tr -d '()')
            if [[ -z "${UPSTREAM_VERSION}" ]]; then
              echo "ERROR: Could not fetch version from flightaware/dump978/${DUMP978_REPO_BRANCH}/debian/changelog"
              exit 1
            fi

            # Normalize version to x.x.x format (append .0 if only x.x)
            if [[ "${UPSTREAM_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
              UPSTREAM_VERSION="${UPSTREAM_VERSION}.0"
            fi

            UPSTREAM_COMMIT=$(git ls-remote "https://github.com/flightaware/dump978.git" \
              "refs/heads/${DUMP978_REPO_BRANCH}" | cut -f1 | cut -c1-12)
            if [[ -z "${UPSTREAM_COMMIT}" ]]; then
              echo "ERROR: Could not fetch commit from flightaware/dump978 ${DUMP978_REPO_BRANCH}"
              exit 1
            fi

            echo "Upstream version: ${UPSTREAM_VERSION} (commit: ${UPSTREAM_COMMIT})"
            TAG="${UPSTREAM_VERSION}"
            NAME="${DISPATCH_NAME:-Upstream dump978 ${UPSTREAM_VERSION} (${UPSTREAM_COMMIT})}"
          else
            TAG="${RELEASE_TAG}"
            NAME="${RELEASE_NAME:-GitHub Release}"
            echo "GitHub release detected"
          fi

          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Release validation passed: ${TAG}"

  release-metadata:
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      upstream_commit: ${{ steps.metadata.outputs.upstream_commit }}
      upstream_version: ${{ steps.metadata.outputs.upstream_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release metadata
        id: metadata
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.validate-release.outputs.release_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Release Version: ${VERSION}"

          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git init "${TMPDIR}" >/dev/null 2>&1
          git -C "${TMPDIR}" remote add origin "${DUMP978_REPO_URL}.git" 2>&1
          if git -C "${TMPDIR}" fetch --depth 1 origin "${DUMP978_REPO_BRANCH}" >/dev/null 2>&1; then
            UPSTREAM_COMMIT="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD 2>/dev/null | cut -c1-12)"
            UPSTREAM_VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:debian/changelog 2>/dev/null | head -1 | awk '{print $2}' | tr -d '()' || echo "${UPSTREAM_COMMIT}")"
            # Normalize version to x.x.x format (append .0 if only x.x)
            if [[ "${UPSTREAM_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
              UPSTREAM_VERSION="${UPSTREAM_VERSION}.0"
            fi
            echo "Upstream dump978: ${UPSTREAM_VERSION} (${UPSTREAM_COMMIT})"
          else
            UPSTREAM_COMMIT="unknown"
            UPSTREAM_VERSION="unknown"
            echo "Warning: Could not fetch upstream metadata"
          fi

          echo "upstream_commit=${UPSTREAM_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"

  tag-images:
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "ERROR: Docker Hub credentials not configured"
            exit 1
          fi

          echo "Docker Hub credentials validated"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Confirm Docker auth
        run: docker info > /dev/null && echo "Docker authentication confirmed"

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-metadata.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-metadata.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-metadata.outputs.version }}
            type=raw,value=upstream-${{ needs.release-metadata.outputs.upstream_commit }}
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push multi-arch release
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          no-cache: false
          pull: true
          provenance: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            DUMP978_REPO_URL=${{ env.DUMP978_REPO_URL }}
            DUMP978_REPO_BRANCH=${{ env.DUMP978_REPO_BRANCH }}

  create-github-release:
    needs: [validate-release, release-metadata, tag-images]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release body
        id: body
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
          UPSTREAM_COMMIT: ${{ needs.release-metadata.outputs.upstream_commit }}
          UPSTREAM_VERSION: ${{ needs.release-metadata.outputs.upstream_version }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cat > /tmp/release_notes.md << EOMD
          ## Release ${RELEASE_VERSION}

          ### Docker Hub Images

          **Primary Registry:**
          \`\`\`bash
          docker pull ${DOCKER_IMAGE}:${RELEASE_VERSION}
          docker pull ${DOCKER_IMAGE}:latest
          \`\`\`

          **Available Tags:**
          - \`${DOCKER_IMAGE}:${RELEASE_VERSION}\` - Specific version (recommended for production)
          - \`${DOCKER_IMAGE}:latest\` - Latest stable release
          - Multi-arch support: amd64, arm64

          ### Build Information

          - **Image Version:** ${RELEASE_VERSION}
          - **Release Tag:** ${RELEASE_TAG}
          - **Upstream dump978 Version:** ${UPSTREAM_VERSION} (from \`debian/changelog\`)
          - **Upstream dump978 Commit:** ${UPSTREAM_COMMIT}
          - **Build Date:** ${BUILD_DATE}
          - **Repository:** https://github.com/${{ github.repository }}

          ### Quick Start

          \`\`\`bash
          docker run -d \\
            --name dump978 \\
            -e TZ=Etc/UTC \\
            -e DUMP978_SDR=driver=rtlsdr \\
            -p 8978:8978 \\
            -p 30978:30978 \\
            -p 30979:30979 \\
            -v dump978-config:/config \\
            --device /dev/bus/usb:/dev/bus/usb \\
            ${DOCKER_IMAGE}:${RELEASE_VERSION}
          \`\`\`
          EOMD
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.release_tag }}
          name: ${{ needs.release-metadata.outputs.release_name }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-notes:
    needs: [validate-release, release-metadata, tag-images]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
          UPSTREAM_COMMIT: ${{ needs.release-metadata.outputs.upstream_commit }}
          UPSTREAM_VERSION: ${{ needs.release-metadata.outputs.upstream_version }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          cat > /tmp/release_notes.md << EOMD
          ## Release ${RELEASE_VERSION}

          ### Docker Hub Images

          **Primary Registry:**
          \`\`\`bash
          docker pull ${DOCKER_IMAGE}:${RELEASE_VERSION}
          docker pull ${DOCKER_IMAGE}:latest
          \`\`\`

          ### Build Information

          - **Image Version:** ${RELEASE_VERSION}
          - **Upstream dump978 Version:** ${UPSTREAM_VERSION}
          - **Upstream dump978 Commit:** ${UPSTREAM_COMMIT}
          - **Build Date:** $(date -u +'%Y-%m-%dT%H:%M:%SZ')

          ### Quick Start

          \`\`\`bash
          docker run -d \\
            --name dump978 \\
            -e TZ=Etc/UTC \\
            -e DUMP978_SDR=driver=rtlsdr \\
            -p 8978:8978 \\
            -p 30978:30978 \\
            -p 30979:30979 \\
            -v dump978-config:/config \\
            --device /dev/bus/usb:/dev/bus/usb \\
            ${DOCKER_IMAGE}:${RELEASE_VERSION}
          \`\`\`
          EOMD
          cat /tmp/release_notes.md

      - name: Update Release Notes
        uses: softprops/action-gh-release@v2
        if: github.event.action == 'published'
        with:
          body_path: /tmp/release_notes.md
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [validate-release, release-metadata, tag-images, create-github-release, create-release-notes]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Release Summary
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          UPSTREAM_VERSION: ${{ needs.release-metadata.outputs.upstream_version }}
          UPSTREAM_COMMIT: ${{ needs.release-metadata.outputs.upstream_commit }}
        run: |
          cat << EOF
          ===== Release Workflow Complete =====
          Version:               ${RELEASE_VERSION}
          Docker Hub Image:      ${DOCKER_IMAGE}:${RELEASE_VERSION}
          Upstream dump978:      ${UPSTREAM_VERSION} (${UPSTREAM_COMMIT})
          ===============================
          EOF
